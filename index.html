<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MANIFEST">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0D0B18">
<title>MANIFEST — Champ de Conscience</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap');

  :root {
    --gold: #C9A84C;
    --gold-light: #E8D5A0;
    --gold-dark: #8B6914;
    --deep: #0D0B18;
    --card: #1A1628;
    --card2: #13101F;
    --border: rgba(201,168,76,0.2);
    --border-hover: rgba(201,168,76,0.45);
    --text: #EDE8DC;
    --text-muted: rgba(237,232,220,0.5);
    --text-dim: rgba(237,232,220,0.3);
    --violet: #7B5EA7;
    --error: #E24B4A;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 20px);
  }

  * {
    box-sizing: border-box;
    margin: 0; padding: 0;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--deep);
    color: var(--text);
    font-family: 'Jost', sans-serif;
    -webkit-text-size-adjust: 100%;
    touch-action: manipulation;
  }

  /* ===== APP SHELL ===== */
  #app-shell {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding-top: var(--safe-top);
    background: var(--deep);
  }

  /* Fond étoilé subtil */
  #app-shell::before {
    content: '';
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 15% 15%, rgba(123,94,167,0.1) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 85%, rgba(201,168,76,0.06) 0%, transparent 55%);
    pointer-events: none; z-index: 0;
  }

  #scroll-area {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
    position: relative; z-index: 1;
  }

  .inner {
    max-width: 480px;
    margin: 0 auto;
    padding: 0 16px 32px;
  }

  /* Anti-zoom iOS — TOUS les inputs >= 16px */
  input, textarea, select, button {
    font-size: 16px !important;
    -webkit-appearance: none;
    appearance: none;
  }

  /* ===== LOADING ===== */
  .loading-screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px; background: var(--deep); z-index: 100;
  }
  .spinner {
    width: 44px; height: 44px; border-radius: 50%;
    border: 2px solid rgba(201,168,76,0.15);
    border-top-color: var(--gold);
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== AUTH ===== */
  .auth-screen {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px 24px;
  }

  .logo-wrap { text-align: center; margin-bottom: 48px; }

  .logo-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 54px; font-weight: 300;
    letter-spacing: 14px; color: var(--gold);
    margin-bottom: 8px;
    text-shadow: 0 0 40px rgba(201,168,76,0.2);
  }

  .logo-tagline {
    font-size: 11px; letter-spacing: 4px;
    text-transform: uppercase; color: var(--text-muted);
  }

  .auth-card {
    background: var(--card);
    border: 0.5px solid var(--border);
    border-radius: 20px;
    padding: 32px 28px;
    width: 100%; max-width: 380px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.4);
  }

  .auth-tabs {
    display: flex; margin-bottom: 28px;
    background: rgba(255,255,255,0.03);
    border: 0.5px solid var(--border);
    border-radius: 10px; overflow: hidden;
  }

  .auth-tab {
    flex: 1; padding: 11px; text-align: center;
    letter-spacing: 1px; cursor: pointer;
    color: var(--text-muted); border: none;
    background: transparent; transition: all 0.2s;
    font-family: 'Jost', sans-serif;
  }
  .auth-tab.active {
    background: rgba(201,168,76,0.15);
    color: var(--gold);
  }

  .field-label {
    font-size: 11px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text-muted);
    margin-bottom: 8px; display: block;
  }

  .field-input {
    width: 100%; padding: 14px 16px;
    background: rgba(255,255,255,0.04);
    border: 0.5px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-family: 'Jost', sans-serif;
    outline: none; transition: border-color 0.2s;
    margin-bottom: 20px;
  }
  .field-input:focus { border-color: var(--gold); }
  .field-input::placeholder { color: var(--text-dim); }

  .btn-primary {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    border: none; border-radius: 10px;
    color: var(--deep); font-family: 'Jost', sans-serif;
    font-weight: 500; letter-spacing: 2px;
    text-transform: uppercase; cursor: pointer;
    transition: opacity 0.2s; margin-top: 4px;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:active { opacity: 0.8; transform: scale(0.99); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .error-msg {
    color: var(--error); text-align: center;
    margin-top: 14px; min-height: 20px;
    font-size: 13px; line-height: 1.4;
  }

  /* ===== TOP BAR ===== */
  .top-bar {
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px 12px;
    border-bottom: 0.5px solid var(--border);
    background: rgba(13,11,24,0.95);
    backdrop-filter: blur(12px);
    position: relative; z-index: 2;
    max-width: 100%;
  }

  .app-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; letter-spacing: 7px;
    color: var(--gold);
  }

  .user-chip {
    display: flex; align-items: center; gap: 10px;
  }

  .user-info {
    font-size: 12px; color: var(--text-muted);
    letter-spacing: 0.5px; max-width: 120px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  .logout-btn {
    background: none; border: 0.5px solid var(--border);
    color: var(--text-muted); font-family: 'Jost', sans-serif;
    font-size: 11px; letter-spacing: 1px;
    padding: 7px 12px; border-radius: 7px; cursor: pointer;
    transition: all 0.2s;
  }
  .logout-btn:active { border-color: var(--gold); color: var(--gold); }

  /* ===== NAV BAS ===== */
  .nav-bottom {
    flex-shrink: 0;
    display: flex;
    background: rgba(13,11,24,0.97);
    backdrop-filter: blur(12px);
    border-top: 0.5px solid var(--border);
    padding: 6px 8px;
    padding-bottom: calc(6px + var(--safe-bottom));
    position: relative; z-index: 2;
  }

  .nav-tab {
    flex: 1; padding: 10px 4px 8px;
    display: flex; flex-direction: column;
    align-items: center; gap: 5px;
    font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
    color: var(--text-muted); border: none; background: transparent;
    border-radius: 8px; cursor: pointer; transition: all 0.2s;
    font-family: 'Jost', sans-serif;
  }
  .nav-tab .nav-icon { font-size: 18px; line-height: 1; }
  .nav-tab.active { color: var(--gold); background: rgba(201,168,76,0.1); }

  /* ===== SECTION TITLES ===== */
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px; font-weight: 300;
    color: var(--text); margin-bottom: 16px;
    letter-spacing: 2px; margin-top: 22px;
  }

  /* ===== MANIFEST CARDS ===== */
  .manifest-card {
    background: var(--card);
    border: 0.5px solid var(--border);
    border-radius: 14px; padding: 18px 20px;
    margin-bottom: 12px; cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative; overflow: hidden;
  }
  .manifest-card:active { opacity: 0.85; }
  .manifest-card.selected {
    border-color: var(--gold);
    background: rgba(201,168,76,0.06);
  }
  .manifest-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--gold); opacity: 0;
    transition: opacity 0.2s;
    border-radius: 14px 0 0 14px;
  }
  .manifest-card.selected::before { opacity: 1; }

  .manifest-title { font-size: 16px; font-weight: 400; margin-bottom: 8px; line-height: 1.3; }
  .manifest-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 10px; line-height: 1.5; }

  .manifest-meta {
    display: flex; align-items: center;
    gap: 10px; font-size: 12px; color: var(--text-dim);
    flex-wrap: wrap;
  }
  .manifest-time { color: var(--gold); font-weight: 500; }

  .delete-btn {
    position: absolute; top: 10px; right: 10px;
    background: none; border: none; cursor: pointer;
    font-size: 16px; color: rgba(226,75,74,0.4);
    padding: 8px; border-radius: 6px; transition: color 0.2s;
    font-family: 'Jost', sans-serif;
  }
  .delete-btn:active { color: var(--error); }

  /* ===== ADD FORM ===== */
  .add-form {
    background: var(--card); border: 0.5px solid var(--border);
    border-radius: 14px; padding: 22px 20px;
    margin-bottom: 20px; margin-top: 4px;
  }

  .textarea-field {
    width: 100%; padding: 14px 16px;
    background: rgba(255,255,255,0.04);
    border: 0.5px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-family: 'Jost', sans-serif;
    outline: none; resize: none;
    transition: border-color 0.2s;
  }
  .textarea-field:focus { border-color: var(--gold); }
  .textarea-field::placeholder { color: var(--text-dim); }

  .btn-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }

  .btn-secondary {
    padding: 12px 20px; background: transparent;
    border: 0.5px solid var(--border); border-radius: 10px;
    color: var(--text-muted); font-family: 'Jost', sans-serif;
    letter-spacing: 1px; cursor: pointer; transition: all 0.2s;
  }
  .btn-secondary:active { border-color: var(--gold); color: var(--gold); }

  .btn-add {
    padding: 12px 24px; background: rgba(201,168,76,0.12);
    border: 0.5px solid var(--gold); border-radius: 10px;
    color: var(--gold); font-family: 'Jost', sans-serif;
    letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; transition: background 0.2s;
  }
  .btn-add:active { background: rgba(201,168,76,0.25); }
  .btn-add:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-add-full {
    width: 100%; padding: 14px;
    background: rgba(201,168,76,0.08);
    border: 0.5px dashed var(--border-hover);
    border-radius: 12px; color: var(--gold);
    font-family: 'Jost', sans-serif; letter-spacing: 2px;
    text-transform: uppercase; cursor: pointer;
    margin-bottom: 16px; transition: background 0.2s;
  }
  .btn-add-full:active { background: rgba(201,168,76,0.16); }

  .empty-state {
    text-align: center; padding: 50px 20px;
    color: var(--text-muted); line-height: 1.8;
  }
  .empty-icon {
    font-size: 40px; margin-bottom: 16px;
    opacity: 0.3; display: block;
  }
  .empty-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px; font-weight: 300;
    color: var(--text-muted); margin-bottom: 10px;
  }

  /* ===== TIMER SECTION ===== */
  .timer-section { text-align: center; padding-bottom: 16px; }

  .selected-vision-label {
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 6px; margin-top: 16px;
  }

  .selected-vision-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px; font-weight: 300; font-style: italic;
    color: var(--gold-light); margin-bottom: 4px;
    letter-spacing: 0.5px; padding: 0 20px; line-height: 1.4;
  }

  .duration-selector {
    display: flex; justify-content: center;
    gap: 10px; margin: 18px 0;
  }

  .dur-btn {
    padding: 12px 22px; background: var(--card);
    border: 0.5px solid var(--border); border-radius: 10px;
    color: var(--text-muted); font-family: 'Jost', sans-serif;
    letter-spacing: 1px; cursor: pointer; transition: all 0.2s;
  }
  .dur-btn.active {
    border-color: var(--gold); color: var(--gold);
    background: rgba(201,168,76,0.1);
  }
  .dur-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* CERCLE TIMER */
  .timer-wrap {
    position: relative; width: 210px; height: 210px;
    margin: 10px auto;
  }

  .timer-svg { transform: rotate(-90deg); }

  .timer-bg-circle { fill: none; stroke: rgba(201,168,76,0.08); stroke-width: 5; }

  .timer-progress {
    fill: none; stroke: var(--gold); stroke-width: 5;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear;
    filter: drop-shadow(0 0 6px rgba(201,168,76,0.4));
  }

  .timer-center {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%); text-align: center;
  }

  .timer-display {
    font-family: 'Cormorant Garamond', serif;
    font-size: 46px; font-weight: 300;
    color: var(--text); line-height: 1; letter-spacing: 3px;
  }

  .timer-label {
    font-size: 10px; letter-spacing: 3px;
    text-transform: uppercase; color: var(--text-muted); margin-top: 8px;
  }

  /* BARRE PROGRESSION */
  .progress-bar-wrap {
    height: 2px; background: rgba(201,168,76,0.08);
    border-radius: 2px; margin: 4px 24px 20px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; background: var(--gold);
    border-radius: 2px; transition: width 1s linear;
  }

  /* MESSAGE INSPIRANT */
  .message-card {
    background: var(--card2);
    border: 0.5px solid var(--border);
    border-radius: 14px; padding: 20px 22px;
    margin: 0 0 18px; min-height: 88px;
    position: relative; overflow: hidden;
  }
  .message-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
    background: linear-gradient(to bottom, transparent, var(--gold), transparent);
  }

  .message-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--gold); margin-bottom: 10px; opacity: 0.7;
  }

  .message-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px; font-weight: 300; font-style: italic;
    color: var(--text); line-height: 1.65; letter-spacing: 0.3px;
    animation: fadeMsg 0.8s forwards;
  }

  @keyframes fadeMsg {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* CONTRÔLES TIMER */
  .timer-controls {
    display: flex; justify-content: center;
    gap: 12px; margin-bottom: 16px;
  }

  .ctrl-btn {
    padding: 14px 34px; border-radius: 10px;
    font-family: 'Jost', sans-serif;
    font-size: 12px; letter-spacing: 2px;
    text-transform: uppercase; cursor: pointer; transition: all 0.2s;
  }
  .ctrl-btn.start {
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    border: none; color: var(--deep); font-weight: 500;
  }
  .ctrl-btn.start:active { opacity: 0.85; transform: scale(0.98); }
  .ctrl-btn.pause {
    background: rgba(201,168,76,0.1);
    border: 0.5px solid var(--gold); color: var(--gold);
  }
  .ctrl-btn.stop {
    background: transparent;
    border: 0.5px solid var(--border); color: var(--text-muted);
  }
  .ctrl-btn:active { opacity: 0.8; }

  /* BANNIÈRE COMPLÉTÉE */
  .completed-banner {
    background: rgba(201,168,76,0.1);
    border: 0.5px solid var(--gold);
    border-radius: 10px; padding: 14px 20px;
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-size: 16px;
    color: var(--gold-light);
    animation: fadeMsg 0.6s forwards;
  }

  /* ===== STATS ===== */
  .stats-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; margin-bottom: 20px;
  }

  .stat-card {
    background: var(--card); border: 0.5px solid var(--border);
    border-radius: 14px; padding: 18px 16px;
  }

  .stat-label {
    font-size: 10px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text-dim);
    margin-bottom: 10px;
  }

  .stat-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px; font-weight: 300; color: var(--gold);
    line-height: 1;
  }

  .stat-unit {
    font-size: 13px; color: var(--text-muted); margin-left: 4px;
  }

  /* CÉLÉBRATION DU JOUR */
  .celebration-card {
    background: linear-gradient(135deg, rgba(123,94,167,0.12), rgba(201,168,76,0.08));
    border: 0.5px solid rgba(201,168,76,0.4);
    border-radius: 18px; padding: 26px 22px;
    text-align: center; margin-bottom: 20px;
  }

  .celebration-icon {
    font-size: 34px; margin-bottom: 12px; display: block;
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  .celebration-msg {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px; font-weight: 300; line-height: 1.65;
    color: var(--text); font-style: italic;
  }

  /* BARRES PAR VISION */
  .vision-stat-card {
    background: var(--card); border: 0.5px solid var(--border);
    border-radius: 12px; padding: 16px 18px; margin-bottom: 10px;
  }

  .vision-stat-row {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 10px;
  }

  .vision-stat-title {
    font-size: 14px; flex: 1; margin-right: 10px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
</style>
</head>
<body>

<div id="app-shell">
  <div id="root">
    <div class="loading-screen">
      <div class="spinner"></div>
      <div style="color:var(--text-muted);font-size:11px;letter-spacing:3px;text-transform:uppercase">Chargement</div>
    </div>
  </div>
</div>

  "Ressens la gratitude comme si c'était déjà là. Car dans un sens profond, ça l'est.",
  "Chaque jour de focus est une couche de plus sur le chef-d'œuvre de ta vie.",
  "Tu plantes des graines de lumière dans le sol de l'univers. Elles poussent.",
  "Ta détermination silencieuse est plus puissante que n'importe quelle circonstance extérieure.",
  "Ce que tu penses de toi-même, l'univers le confirme. Pense grandeur.",
  "Le passage entre le désir et la réalité est toujours fait de foi et d'action alignée.",
  "Tu es une force de nature. Ce que tu décides de créer, se crée."
];

// ===== STATE =====
let currentUser           = null;
let manifestations        = [];
let selectedManifestId    = null;
let currentTab            = 'manifests';
let timerInterval         = null;
let messageInterval       = null;
let totalSeconds          = 0;
let remainingSeconds      = 0;
let selectedDuration      = 5;
let isRunning             = false;
let currentMsgIndex       = 0;
let sessionSeconds        = 0;
let lastCompletedSession  = 0;
let addingNew             = false;
let authMode              = 'login';
let bgTimestamp           = null;

// ===== TIMER ARRIÈRE-PLAN (Page Visibility API) =====
document.addEventListener('visibilitychange', () => {
  if (!isRunning) return;
  if (document.hidden) {
    bgTimestamp = Date.now();
  } else if (bgTimestamp) {
    const elapsed = Math.floor((Date.now() - bgTimestamp) / 1000);
    bgTimestamp = null;
    const toSub = Math.min(elapsed, remainingSeconds);
    remainingSeconds -= toSub;
    sessionSeconds   += toSub;
    if (remainingSeconds <= 0) {
      completeTimer();
    } else {
      renderCurrentTab();
    }
  }
});

// ===== HELPERS =====
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatTime(secs) {
  const m = Math.floor(secs / 60), s = secs % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function formatDur(secs) {
  if (!secs || secs < 1) return '0 min';
  const m = Math.floor(secs / 60), s = secs % 60;
  if (m === 0) return `${s}s`;
  if (s === 0) return `${m} min`;
  return `${m}m ${s}s`;
}

function todayKey() { return new Date().toISOString().slice(0, 10); }

function getSelectedManifest() {
  return manifestations.find(m => m.id === selectedManifestId) || null;
}

function getDailyMsg(secs) {
  const m = Math.floor(secs / 60);
  if (m < 2)  return null;
  if (m < 10) return { icon: "✨", msg: `${m} minutes de focus aujourd'hui. Chaque moment compte. Tu as planté des graines de lumière.` };
  if (m < 20) return { icon: "🌟", msg: `${m} minutes de conscience dirigée. Tu deviens la meilleure version de toi-même.` };
  if (m < 30) return { icon: "🔥", msg: `${m} minutes de manifestation pure! Ton engagement est remarquable. L'univers l'a noté.` };
  if (m < 60) return { icon: "💫", msg: `${m} minutes de création consciente aujourd'hui. Tu es une force de nature. Continue.` };
  return { icon: "👑", msg: `${m} minutes! Plus d'une heure dédiée à la manifestation de tes rêves. Le cosmos est impressionné.` };
}

// ===== FIREBASE OPERATIONS =====
async function loadManifestations() {
  if (!currentUser) return;
  try {
    const q = query(
      collection(db, 'manifestations'),
      where('uid', '==', currentUser.uid),
      orderBy('created', 'desc')
    );
    const snap = await getDocs(q);
    manifestations = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch (e) { console.error('loadManifestations', e); }
}

async function addManifestDoc(title, desc) {
  const ref = await addDoc(collection(db, 'manifestations'), {
    uid: currentUser.uid, title, desc,
    totalSeconds: 0, sessions: 0,
    created: serverTimestamp()
  });
  manifestations.unshift({
    id: ref.id, uid: currentUser.uid, title, desc,
    totalSeconds: 0, sessions: 0, created: new Date()
  });
}

async function deleteManifestDoc(id) {
  await deleteDoc(doc(db, 'manifestations', id));
  manifestations = manifestations.filter(m => m.id !== id);
  if (selectedManifestId === id) selectedManifestId = null;
}

async function saveSession(manifestId, secs) {
  try {
    await updateDoc(doc(db, 'manifestations', manifestId), {
      totalSeconds: increment(secs), sessions: increment(1)
    });
    const m = manifestations.find(x => x.id === manifestId);
    if (m) { m.totalSeconds = (m.totalSeconds || 0) + secs; m.sessions = (m.sessions || 0) + 1; }

    const today  = todayKey();
    const dayRef = doc(db, 'dailyFocus', `${currentUser.uid}_${today}`);
    const snap   = await getDoc(dayRef);
    if (snap.exists()) {
      await updateDoc(dayRef, { seconds: increment(secs) });
    } else {
      await setDoc(dayRef, { uid: currentUser.uid, date: today, seconds: secs });
    }
  } catch (e) { console.error('saveSession', e); }
}

async function getTodaySecs() {
  try {
    const snap = await getDoc(doc(db, 'dailyFocus', `${currentUser.uid}_${todayKey()}`));
    return snap.exists() ? (snap.data().seconds || 0) : 0;
  } catch (e) { return 0; }
}

// ===== RENDER =====
function getRoot() { return document.getElementById('root'); }

function render() {
  const shell = document.getElementById('app-shell');
  if (!currentUser) {
    shell.innerHTML = `<div id="root">${buildAuth()}</div>`;
    attachAuthEvents();
    return;
  }
  const displayName = currentUser.displayName || currentUser.email;
  shell.innerHTML = `
    <div class="top-bar">
      <div class="app-name">MANIFEST</div>
      <div class="user-chip">
        <div class="user-info">${esc(displayName)}</div>
        <button class="logout-btn" id="btn-logout">Quitter</button>
      </div>
    </div>
    <div id="scroll-area">
      <div class="inner" id="tab-content"></div>
    </div>
    <nav class="nav-bottom">
      <button class="nav-tab ${currentTab==='manifests'?'active':''}" data-tab="manifests">
        <span class="nav-icon">✦</span>Visions
      </button>
      <button class="nav-tab ${currentTab==='focus'?'active':''}" data-tab="focus">
        <span class="nav-icon">◎</span>Focus
      </button>
      <button class="nav-tab ${currentTab==='stats'?'active':''}" data-tab="stats">
        <span class="nav-icon">◈</span>Progrès
      </button>
    </nav>`;
  document.getElementById('btn-logout').onclick = async () => { stopTimer(); await signOut(auth); };
  document.querySelectorAll('.nav-tab[data-tab]').forEach(btn => {
    btn.onclick = () => {
      currentTab = btn.dataset.tab;
      lastCompletedSession = 0;
      document.querySelectorAll('.nav-tab[data-tab]').forEach(b => b.classList.toggle('active', b.dataset.tab === currentTab));
      renderCurrentTab();
    };
  });
  renderCurrentTab();
}

function renderCurrentTab() {
  const el = document.getElementById('tab-content');
  if (!el) return;
  if (currentTab === 'manifests') el.innerHTML = buildManifests();
  else if (currentTab === 'focus')     el.innerHTML = buildFocus();
  else                                 el.innerHTML = buildStats();
  attachTabEvents();
  if (currentTab === 'stats') loadTodayStats();
}

// ===== BUILD HTML =====
function buildAuth() {
  const isLogin = authMode === 'login';
  return `
  <div class="auth-screen">
    <div class="logo-wrap">
      <div class="logo-title">MANIFEST</div>
      <div class="logo-tagline">Champ de Conscience</div>
    </div>
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab ${isLogin?'active':''}" id="tab-login">Connexion</button>
        <button class="auth-tab ${!isLogin?'active':''}" id="tab-register">Créer un compte</button>
      </div>
      <label class="field-label">Courriel</label>
      <input class="field-input" id="auth-email" type="email"
             placeholder="toi@exemple.com" autocomplete="email" inputmode="email">
      <label class="field-label">Mot de passe</label>
      <input class="field-input" id="auth-pass" type="password"
             placeholder="••••••••" autocomplete="${isLogin?'current-password':'new-password'}">
      ${!isLogin ? `
        <label class="field-label">Prénom (affiché)</label>
        <input class="field-input" id="auth-name" placeholder="Ton prénom" autocomplete="given-name">
      ` : ''}
      <button class="btn-primary" id="auth-submit">
        ${isLogin ? 'Entrer dans le champ' : 'Créer mon espace'}
      </button>
      <div class="error-msg" id="auth-error"></div>
    </div>
  </div>`;
}

function buildManifests() {
  let h = `<div class="section-title">Mes visions</div>`;

  if (addingNew) {
    h += `
    <div class="add-form">
      <label class="field-label">Titre de ta vision</label>
      <input class="field-input" id="new-title"
             placeholder="Ex: Ma maison de rêve au bord de l'eau" maxlength="100">
      <label class="field-label" style="margin-top:4px">Description (optionnel)</label>
      <textarea class="textarea-field" id="new-desc" rows="3"
        placeholder="Décris ce que tu ressens en imaginant que c'est déjà accompli..."
        style="margin-bottom:0"></textarea>
      <div class="btn-row" style="margin-top:14px">
        <button class="btn-secondary" id="btn-cancel-add">Annuler</button>
        <button class="btn-add" id="btn-confirm-add">Ajouter</button>
      </div>
    </div>`;
  } else {
    h += `<button class="btn-add-full" id="btn-new">+ Nouvelle vision</button>`;
  }

  if (manifestations.length === 0 && !addingNew) {
    h += `
    <div class="empty-state">
      <span class="empty-icon">✦</span>
      <div class="empty-title">Ton espace est vide</div>
      Ajoute ta première vision.<br>
      Ce sur quoi tu concentres ton attention<br>prend forme dans ta vie.
    </div>`;
  }

  manifestations.forEach(m => {
    const ts = m.created
      ? new Date(m.created.seconds ? m.created.seconds * 1000 : m.created).toLocaleDateString('fr-CA')
      : '';
    h += `
    <div class="manifest-card ${m.id === selectedManifestId ? 'selected' : ''}" data-mid="${m.id}">
      <button class="delete-btn" data-del="${m.id}" title="Supprimer">✕</button>
      <div class="manifest-title">${esc(m.title)}</div>
      ${m.desc ? `<div class="manifest-desc">${esc(m.desc)}</div>` : ''}
      <div class="manifest-meta">
        ${ts ? `<span>${ts}</span>` : ''}
        <span class="manifest-time">⏱ ${formatDur(m.totalSeconds || 0)}</span>
        <span>${m.sessions || 0} session${(m.sessions || 0) !== 1 ? 's' : ''}</span>
      </div>
    </div>`;
  });

  if (manifestations.length > 0 && selectedManifestId) {
    h += `<button class="btn-primary" id="btn-go-focus" style="margin-top:8px">
      Commencer le focus ▶
    </button>`;
  }

  return h;
}

function buildFocus() {
  const manifest = getSelectedManifest();
  let h = `<div class="section-title">Session de focus</div>`;

  if (!manifest) {
    h += `
    <div class="empty-state">
      <span class="empty-icon">◎</span>
      <div class="empty-title">Aucune vision sélectionnée</div>
      Va dans "Visions", sélectionne<br>une de tes manifestations<br>puis reviens ici.
    </div>`;
    return h;
  }

  const CIRC    = 2 * Math.PI * 92;
  const progress = totalSeconds > 0 ? (1 - remainingSeconds / totalSeconds) : 0;
  const offset   = CIRC - progress * CIRC;

  h += `
  <div class="timer-section">
    <div class="selected-vision-label">Vision en cours</div>
    <div class="selected-vision-title">${esc(manifest.title)}</div>

    <div class="duration-selector">
      <button class="dur-btn ${selectedDuration===2?'active':''}" data-dur="2" ${isRunning?'disabled':''}>2 min</button>
      <button class="dur-btn ${selectedDuration===5?'active':''}" data-dur="5" ${isRunning?'disabled':''}>5 min</button>
      <button class="dur-btn ${selectedDuration===10?'active':''}" data-dur="10" ${isRunning?'disabled':''}>10 min</button>
    </div>

    <div class="timer-wrap">
      <svg class="timer-svg" width="210" height="210" viewBox="0 0 210 210">
        <circle class="timer-bg-circle" cx="105" cy="105" r="92"/>
        <circle class="timer-progress" cx="105" cy="105" r="92"
          stroke-dasharray="${CIRC.toFixed(2)}"
          stroke-dashoffset="${offset.toFixed(2)}"
          id="timer-arc"/>
      </svg>
      <div class="timer-center">
        <div class="timer-display" id="timer-disp">${formatTime(remainingSeconds || selectedDuration * 60)}</div>
        <div class="timer-label">${isRunning ? 'en focus' : 'prêt'}</div>
      </div>
    </div>

    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="prog-fill" style="width:${Math.round(progress * 100)}%"></div>
    </div>

    ${isRunning ? `
    <div class="message-card">
      <div class="message-dot"></div>
      <div class="message-text" id="msg-text">${esc(MESSAGES[currentMsgIndex % MESSAGES.length])}</div>
    </div>
    <div class="timer-controls">
      <button class="ctrl-btn pause" id="btn-pause">Pause</button>
      <button class="ctrl-btn stop" id="btn-stop">Arrêter</button>
    </div>
    ` : `
    <div class="timer-controls">
      <button class="ctrl-btn start" id="btn-start">Commencer</button>
    </div>
    `}

    ${lastCompletedSession > 0 && !isRunning ? `
    <div class="completed-banner">
      Session de ${formatDur(lastCompletedSession)} complétée ✦
    </div>` : ''}

  </div>`;
  return h;
}

function buildStats() {
  const totalAll  = manifestations.reduce((a, m) => a + (m.totalSeconds || 0), 0);
  const totalSess = manifestations.reduce((a, m) => a + (m.sessions || 0), 0);

  let h = `<div class="section-title">Ma progression</div>`;
  h += `<div id="today-celebration"></div>`;
  h += `
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Focus aujourd'hui</div>
      <div class="stat-value" id="today-mins">
        <span style="font-size:20px;color:var(--text-muted)">...</span>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total cumulé</div>
      <div class="stat-value">${Math.floor(totalAll / 60)}<span class="stat-unit">min</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Visions actives</div>
      <div class="stat-value">${manifestations.length}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Sessions total</div>
      <div class="stat-value">${totalSess}</div>
    </div>
  </div>`;

  if (manifestations.length > 0) {
    h += `<div class="section-title" style="margin-top:4px;font-size:18px">Temps par vision</div>`;
    manifestations.forEach(m => {
      const pct = totalAll > 0 ? Math.round(((m.totalSeconds || 0) / totalAll) * 100) : 0;
      h += `
      <div class="vision-stat-card">
        <div class="vision-stat-row">
          <div class="vision-stat-title">${esc(m.title)}</div>
          <div class="manifest-time" style="white-space:nowrap">${formatDur(m.totalSeconds || 0)}</div>
        </div>
        <div class="progress-bar-wrap" style="margin:0">
          <div class="progress-bar-fill" style="width:${pct}%;transition:none"></div>
        </div>
        <div style="font-size:11px;color:var(--text-dim);margin-top:6px;text-align:right">${m.sessions||0} session${(m.sessions||0)!==1?'s':''}</div>
      </div>`;
    });
  }

  return h;
}

// ===== EVENTS =====
function attachAuthEvents() {
  document.getElementById('tab-login').onclick    = () => { authMode = 'login';    render(); };
  document.getElementById('tab-register').onclick = () => { authMode = 'register'; render(); };
  document.getElementById('auth-submit').onclick  = doAuth;
  document.getElementById('auth-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doAuth(); });
}

function attachTabEvents() {
  if (currentTab === 'manifests') {
    const btnNew = document.getElementById('btn-new');
    if (btnNew) btnNew.onclick = () => { addingNew = true; renderCurrentTab(); };

    const btnCancel = document.getElementById('btn-cancel-add');
    if (btnCancel) btnCancel.onclick = () => { addingNew = false; renderCurrentTab(); };

    const btnConfirm = document.getElementById('btn-confirm-add');
    if (btnConfirm) btnConfirm.onclick = async () => {
      const title = document.getElementById('new-title').value.trim();
      if (!title) { document.getElementById('new-title').focus(); return; }
      btnConfirm.disabled = true;
      const desc = document.getElementById('new-desc').value.trim();
      await addManifestDoc(title, desc);
      addingNew = false;
      selectedManifestId = manifestations[0]?.id || null;
      renderCurrentTab();
    };

    document.querySelectorAll('.manifest-card[data-mid]').forEach(card => {
      card.onclick = e => {
        if (e.target.closest('.delete-btn')) return;
        selectedManifestId = card.dataset.mid;
        renderCurrentTab();
      };
    });

    document.querySelectorAll('.delete-btn[data-del]').forEach(btn => {
      btn.onclick = async e => {
        e.stopPropagation();
        if (!confirm('Supprimer cette vision?')) return;
        await deleteManifestDoc(btn.dataset.del);
        renderCurrentTab();
      };
    });

    const btnFocus = document.getElementById('btn-go-focus');
    if (btnFocus) btnFocus.onclick = () => {
      currentTab = 'focus';
      document.querySelectorAll('.nav-tab[data-tab]').forEach(b => b.classList.toggle('active', b.dataset.tab === 'focus'));
      renderCurrentTab();
    };
  }

  if (currentTab === 'focus') {
    document.querySelectorAll('.dur-btn[data-dur]').forEach(btn => {
      btn.onclick = () => {
        if (isRunning) return;
        selectedDuration = parseInt(btn.dataset.dur);
        totalSeconds     = selectedDuration * 60;
        remainingSeconds = totalSeconds;
        lastCompletedSession = 0;
        renderCurrentTab();
      };
    });

    const bs = document.getElementById('btn-start');
    if (bs) bs.onclick = startTimer;
    const bp = document.getElementById('btn-pause');
    if (bp) bp.onclick = pauseTimer;
    const bst = document.getElementById('btn-stop');
    if (bst) bst.onclick = stopTimer;
  }
}

async function doAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const pass  = document.getElementById('auth-pass').value;
  const errEl = document.getElementById('auth-error');
  const btn   = document.getElementById('auth-submit');
  if (!email || !pass) { errEl.textContent = 'Remplis tous les champs.'; return; }
  btn.disabled = true; btn.textContent = '...';
  try {
    if (authMode === 'login') {
      await signInWithEmailAndPassword(auth, email, pass);
    } else {
      const name = document.getElementById('auth-name')?.value.trim() || '';
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      if (name) await updateProfile(cred.user, { displayName: name });
    }
  } catch (e) {
    const msgs = {
      'auth/invalid-email':       'Courriel invalide.',
      'auth/user-not-found':      'Aucun compte avec ce courriel.',
      'auth/wrong-password':      'Mot de passe incorrect.',
      'auth/email-already-in-use':'Ce courriel est déjà utilisé.',
      'auth/weak-password':       'Mot de passe trop faible (min. 6 caractères).',
      'auth/invalid-credential':  'Courriel ou mot de passe incorrect.'
    };
    errEl.textContent = msgs[e.code] || `Erreur: ${e.message}`;
    btn.disabled = false;
    btn.textContent = authMode === 'login' ? 'Entrer dans le champ' : 'Créer mon espace';
  }
}

// ===== TIMER =====
function startTimer() {
  if (!selectedManifestId) return;
  if (!totalSeconds || remainingSeconds <= 0) {
    totalSeconds     = selectedDuration * 60;
    remainingSeconds = totalSeconds;
  }
  sessionSeconds  = 0;
  isRunning       = true;
  currentMsgIndex = Math.floor(Math.random() * MESSAGES.length);
  renderCurrentTab();
  runTick();
  startMessages();
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

function runTick() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (!isRunning) { clearInterval(timerInterval); return; }
    remainingSeconds--;
    sessionSeconds++;
    // Mise à jour directe sans re-render complet
    const elDisp = document.getElementById('timer-disp');
    const elArc  = document.getElementById('timer-arc');
    const elProg = document.getElementById('prog-fill');
    if (elDisp) elDisp.textContent = formatTime(remainingSeconds);
    if (elArc) {
      const C = 2 * Math.PI * 92;
      elArc.setAttribute('stroke-dashoffset', (C - (1 - remainingSeconds / totalSeconds) * C).toFixed(2));
    }
    if (elProg) elProg.style.width = Math.round((1 - remainingSeconds / totalSeconds) * 100) + '%';
    if (remainingSeconds <= 0) completeTimer();
  }, 1000);
}

function startMessages() {
  if (messageInterval) clearInterval(messageInterval);
  // Intervalle adapté à la durée : message toutes les ~6s pour 2min, ~18s pour 5min, ~36s pour 10min
  const ms = Math.max(12000, Math.min(selectedDuration * 7000, 36000));
  messageInterval = setInterval(() => {
    if (!isRunning) { clearInterval(messageInterval); return; }
    currentMsgIndex = (currentMsgIndex + 1) % MESSAGES.length;
    const el = document.getElementById('msg-text');
    if (el) {
      el.style.animation = 'none';
      el.offsetHeight; // reflow
      el.style.animation = '';
      el.textContent = MESSAGES[currentMsgIndex];
    }
  }, ms);
}

function pauseTimer() {
  isRunning = false;
  clearInterval(timerInterval);
  clearInterval(messageInterval);
  if (sessionSeconds > 0) {
    saveSession(selectedManifestId, sessionSeconds);
    lastCompletedSession = sessionSeconds;
    sessionSeconds = 0;
  }
  renderCurrentTab();
}

function stopTimer() {
  const saved = sessionSeconds;
  isRunning = false;
  clearInterval(timerInterval);
  clearInterval(messageInterval);
  if (saved > 0) {
    saveSession(selectedManifestId, saved);
    lastCompletedSession = saved;
    sessionSeconds = 0;
  }
  remainingSeconds = totalSeconds;
  renderCurrentTab();
}

function completeTimer() {
  const saved = sessionSeconds;
  isRunning = false;
  clearInterval(timerInterval);
  clearInterval(messageInterval);
  if (saved > 0) {
    saveSession(selectedManifestId, saved);
    lastCompletedSession = saved;
    sessionSeconds = 0;
  }
  remainingSeconds = 0;
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification('MANIFEST — Session complétée', {
      body: `${selectedDuration} minutes de focus accomplis. Tu manifestes ta réalité. ✦`
    });
  }
  renderCurrentTab();
}

async function loadTodayStats() {
  const secs = await getTodaySecs();
  const el   = document.getElementById('today-mins');
  if (el) el.innerHTML = `${Math.floor(secs / 60)}<span class="stat-unit">min</span>`;
  const cel = document.getElementById('today-celebration');
  if (cel) {
    const c = getDailyMsg(secs);
    if (c) {
      cel.innerHTML = `
      <div class="celebration-card">
        <span class="celebration-icon">${c.icon}</span>
        <div class="celebration-msg">${c.msg}</div>
      </div>`;
    }
  }
}

// ===== AUTH STATE =====
onAuthStateChanged(auth, async user => {
  currentUser = user;
  if (user) {
    await loadManifestations();
    if (!totalSeconds) {
      totalSeconds     = selectedDuration * 60;
      remainingSeconds = totalSeconds;
    }
  }
  render();
});
</script>
